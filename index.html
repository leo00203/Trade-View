<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Custom Dashboard</title>

  <style>
    body {
      background: #0f0f0f;
      color: #eee;
      font-family: Arial;
      padding: 25px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .widget {
      background: #1b1b1b;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .add-box {
      background: #151515;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 40px;
      border: 1px solid #444;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      background: #1d1d1d;
      border: 1px solid #333;
      color: #fff;
      border-radius: 5px;
      font-family: monospace;
    }

    button {
      padding: 10px 15px;
      background: #007bff;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>

</head>
<body>

  <h1>🛠️ Custom Code Dashboard</h1>

  <!-- Box zum Hinzufügen -->
  <div class="add-box">
      <h2>Neues Widget hinzufügen</h2>

      <label>Widget Name:</label>
      <input id="widgetName" placeholder="z.B. BTC Preis, Notiz, API Test usw.">

      <label>JavaScript Code:</label>
      <textarea id="widgetCode" rows="6" placeholder="Hier JavaScript einfügen"></textarea>

      <button onclick="addWidget()">Widget hinzufügen</button>
  </div>

  <h2>📦 Deine Widgets</h2>
  <div id="widgets"></div>

  <script>
    // Widgets aus localStorage laden
    let widgets = JSON.parse(localStorage.getItem("widgets") || "[]");

    function renderWidgets() {
      const container = document.getElementById("widgets");
      container.innerHTML = "";

      widgets.forEach((w, index) => {
        const box = document.createElement("div");
        box.className = "widget";

        box.innerHTML = `
          <h3>${w.name}</h3>
          <pre>${w.code.replace(/</g, "&lt;")}</pre>
          <button onclick="runCode(${index})">▶ Code ausführen</button>
          <button style="margin-left:10px; background:#c62828" onclick="deleteWidget(${index})">🗑 Löschen</button>
          <div id="output-${index}" style="margin-top:15px; padding:10px; background:#111; border-radius:5px;"></div>
        `;

        container.appendChild(box);
      });
    }

    // Neues Widget speichern + anzeigen
    function addWidget() {
      const name = document.getElementById("widgetName").value.trim();
      const code = document.getElementById("widgetCode").value.trim();

      if (!name || !code) return alert("Bitte Name und Code eingeben!");

      widgets.push({ name, code });
      localStorage.setItem("widgets", JSON.stringify(widgets));

      document.getElementById("widgetName").value = "";
      document.getElementById("widgetCode").value = "";

      renderWidgets();
    }

    // Code ausführen (mit Sandbox-Ausgabe)
    function runCode(index) {
      const outputBox = document.getElementById(`output-${index}`);
      outputBox.innerHTML = "Wird ausgeführt...";

      try {
        const result = new Function("output", widgets[index].code);
        result((msg) => outputBox.innerHTML = msg);
      } catch (e) {
        outputBox.innerHTML = "❌ Fehler: " + e;
      }
    }

    // Widget löschen
    function deleteWidget(index) {
      widgets.splice(index, 1);
      localStorage.setItem("widgets", JSON.stringify(widgets));
      renderWidgets();
    }

    // Beim Laden rendern
    renderWidgets();
  </script>

</body>
</html>
